<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Plan de Grabación</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#0a0a0a;--card:#181818;--card2:#1e1e1e;--border:rgba(255,255,255,0.09);--text:#f0f0f0;--muted:#666;--accent:#c8f135;--red:#ff4444;--amber:#ffb300;--blue:#5ab8ff;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}
.screen{display:none;}
.screen.active{display:flex;flex-direction:column;}
#splash.active{align-items:center;justify-content:center;min-height:100vh;padding:2rem;text-align:center;}
.logo{font-family:'Syne',sans-serif;font-size:72px;font-weight:800;line-height:.9;letter-spacing:-.03em;margin-bottom:.3rem;}
.logo span{color:var(--accent);}
.splash-sub{color:var(--muted);font-size:14px;margin-bottom:2.5rem;}
.counts{display:flex;gap:2rem;justify-content:center;margin-bottom:2.5rem;}
.cnt{text-align:center;}
.cnt-n{font-family:'Syne',sans-serif;font-size:40px;font-weight:800;color:var(--accent);line-height:1;}
.cnt-l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-top:2px;}
.go-btn{background:var(--accent);color:#000;border:none;padding:18px 0;border-radius:100px;font-family:'Syne',sans-serif;font-size:17px;font-weight:700;cursor:pointer;width:100%;max-width:300px;}
.rules-box{margin-top:2rem;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.25rem 1.5rem;max-width:340px;width:100%;text-align:left;}
.rules-ttl{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:.7rem;}
.rule{font-size:14px;color:#bbb;padding:4px 0;display:flex;gap:8px;}
.rule b{color:var(--text);font-weight:500;}
.topbar{position:sticky;top:0;z-index:50;background:rgba(10,10,10,.95);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:10px 16px;gap:12px;}
.back{background:none;border:1px solid var(--border);color:var(--muted);font-size:13px;padding:5px 13px;border-radius:100px;cursor:pointer;font-family:'DM Sans',sans-serif;flex-shrink:0;}
.prog-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
.prog-lbl{font-size:12px;color:var(--muted);}
.prog-bg{width:100%;max-width:180px;height:3px;background:#222;border-radius:100px;overflow:hidden;}
.prog-fill{height:100%;background:var(--accent);border-radius:100px;transition:width .3s;}
.done-pill{background:rgba(200,241,53,.1);border:1px solid rgba(200,241,53,.2);color:var(--accent);font-size:11px;padding:4px 10px;border-radius:100px;flex-shrink:0;}
.vcontent{padding:1.25rem 1.25rem 2.5rem;max-width:480px;margin:0 auto;width:100%;}
.vnum{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.3rem;}
.vtitle{font-family:'Syne',sans-serif;font-size:clamp(26px,7vw,38px);font-weight:800;line-height:1.05;margin-bottom:1.25rem;}
.preview-box{background:#111;border:1px solid var(--border);border-radius:18px;overflow:hidden;margin-bottom:1.25rem;}
.preview-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;padding:.6rem 1rem .3rem;}
.preview-svg{display:block;width:100%;height:auto;}
.setup-pill{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--border);border-radius:100px;padding:10px 18px;margin-bottom:1.25rem;}
.setup-icon{font-size:18px;flex-shrink:0;}
.setup-txt{font-size:14px;color:#bbb;line-height:1.3;}
.hook-card{background:rgba(200,241,53,.06);border:2px solid rgba(200,241,53,.25);border-radius:18px;padding:1.1rem 1.25rem 1rem;margin-bottom:1.25rem;}
.hook-lbl{font-size:10px;color:var(--accent);text-transform:uppercase;letter-spacing:.12em;margin-bottom:.5rem;}
.hook-txt{font-family:'Syne',sans-serif;font-size:clamp(16px,4.5vw,22px);font-weight:700;line-height:1.25;color:#fff;}
.hook-note{font-size:12px;color:rgba(200,241,53,.6);margin-top:.6rem;font-style:italic;}
.action-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:1.1rem 1.25rem;margin-bottom:1.25rem;}
.action-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;margin-bottom:.75rem;}
.action-line{display:flex;gap:12px;align-items:flex-start;padding:6px 0;border-bottom:1px solid var(--border);font-size:15px;color:#ddd;line-height:1.4;}
.action-line:last-child{border-bottom:none;padding-bottom:0;}
.astep{font-family:'Syne',sans-serif;font-weight:700;color:var(--accent);font-size:14px;flex-shrink:0;width:18px;}
.items-wrap{margin-bottom:1.25rem;}
.items-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;margin-bottom:.6rem;}
.pills{display:flex;flex-wrap:wrap;gap:7px;}
.pill{background:#1e1e1e;border:1px solid rgba(255,255,255,.12);color:#ccc;font-size:14px;padding:6px 14px;border-radius:100px;}
.nav-row{display:flex;gap:10px;margin-top:1.75rem;}
.btn-prev{flex:1;background:none;border:1px solid var(--border);color:var(--muted);padding:16px;border-radius:14px;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;cursor:pointer;}
.btn-next{flex:2;background:var(--accent);color:#000;border:none;padding:16px;border-radius:14px;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;cursor:pointer;}
.btn-next:active{transform:scale(.97);}
#finish.active{align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:2rem;}
.fin-icon{font-size:64px;margin-bottom:1rem;}
.fin-ttl{font-family:'Syne',sans-serif;font-size:38px;font-weight:800;color:var(--accent);margin-bottom:.4rem;}
.fin-sub{color:var(--muted);font-size:15px;margin-bottom:2rem;}
.fin-back{background:none;border:1px solid var(--border);color:var(--muted);padding:12px 28px;border-radius:100px;font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;}
</style>
</head>
<body>

<div id="splash" class="screen active">
  <div class="logo">PLAN DE<br><span>GRABACIÓN</span></div>
  <div class="splash-sub">Semana actual</div>
  <div class="counts">

    <div class="rule">📱 <span>Grabar en <b>vertical</b></span></div>

    <div class="rule">🎬 <span>Cada video: <b>2 tomas</b></span></div>

</div>

<div id="viewer" class="screen">
  <div class="topbar">
    <button class="back" id="backBtn">← Inicio</button>
    <div class="prog-wrap">
      <div class="prog-lbl" id="progLbl">1 / 21</div>
      <div class="prog-bg"><div class="prog-fill" id="progFill" style="width:5%"></div></div>
    </div>
    <div class="done-pill" id="donePill">0 listos</div>
  </div>
  <div class="vcontent" id="vcontent"></div>
</div>

<div id="finish" class="screen">
  <div class="fin-icon">🎬</div>
  <div class="fin-ttl">¡Listo!</div>
  <div class="fin-sub">Todos los videos grabados.<br>Enviá el material.</div>
  <button class="fin-back" id="restartBtn">← Volver al inicio</button>
</div>

var cur=0, done={};

function show(id){
  ['splash','viewer','finish'].forEach(function(s){document.getElementById(s).classList.remove('active');});
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function getSvg(key){
  var fn = SVG_MAP[key];
  return fn ? fn() : svgLookFilmmaker();
}

function render(idx){
  cur=idx;
  var v=V[idx], total=V.length, dc=Object.keys(done).length;
  document.getElementById('progLbl').textContent=(idx+1)+' / '+total;
  document.getElementById('progFill').style.width=Math.round((idx+1)/total*100)+'%';
  document.getElementById('donePill').textContent=dc+' listos';

  var stepsHtml=v.steps.map(function(s,i){
    return '<div class="action-line"><span class="astep">'+(i+1)+'</span><span>'+s+'</span></div>';
  }).join('');

  var itemsHtml='';
  if(v.items&&v.items.length){
    itemsHtml='<div class="items-wrap"><div class="items-lbl">Ítems</div><div class="pills">'+
      v.items.map(function(i){return '<span class="pill">'+i+'</span>';}).join('')+
      '</div></div>';
  }

  var hookNote=v.editorPone?'<div class="hook-note">El editor lo pone en pantalla — vos NO lo decís</div>':'';
  var prevBtn=idx>0?'<button class="btn-prev" data-a="prev" data-i="'+(idx-1)+'">← Atrás</button>':'';
  var nextTxt=idx===total-1?'¡Terminé! →':'Grabado → siguiente';

  document.getElementById('vcontent').innerHTML=
    '<div class="vnum">Video '+(idx+1)+' de '+total+'</div>'+
    '<div class="vtitle">'+v.title+'</div>'+
    '<div class="preview-box"><div class="preview-lbl">Así se graba</div>'+getSvg(v.ilus)+'</div>'+
    '<div class="setup-pill"><span class="setup-icon">🎥</span><span class="setup-txt">'+v.tipo+'</span></div>'+
    '<div class="hook-card"><div class="hook-lbl">Gancho</div><div class="hook-txt">'+v.gancho+'</div>'+hookNote+'</div>'+
    '<div class="action-card"><div class="action-lbl">Qué hacés</div>'+stepsHtml+'</div>'+
    itemsHtml+
    '<div class="nav-row">'+prevBtn+'<button class="btn-next" data-a="next" data-i="'+idx+'">'+nextTxt+'</button></div>';

  show('viewer');
}

document.addEventListener('click',function(e){
  var t=e.target;
  if(t.id==='startBtn'){render(0);return;}
  if(t.id==='backBtn'){show('splash');return;}
  if(t.id==='restartBtn'){show('splash');return;}
  if(!t.dataset||!t.dataset.a)return;
  if(t.dataset.a==='prev'){render(parseInt(t.dataset.i));return;}
  if(t.dataset.a==='next'){
    var i=parseInt(t.dataset.i);
    done[i]=true;
    if(i===V.length-1){show('finish');}else{render(i+1);}
  }
});
</script>
